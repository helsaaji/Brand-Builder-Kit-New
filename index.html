<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4F46E5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192x192-A.png" type="image/png" />
  <title>PWA Template Responsif</title>
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    .calculator {
      max-width: 300px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 12px;
      background: #1f2937;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .display {
      width: 100%;
      height: 50px;
      font-size: 20px;
      margin-bottom: 10px;
      text-align: right;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .buttons button {
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .buttons button:hover {
      opacity: 0.8;
    }

    .operator { background: #6366f1; color: white; }
    .equal { background: #10b981; color: white; }
    .clear { background: #ef4444; color: white; }
  </style>
</head>

<body>
  <header class="header">
    <h1>PWA Template</h1>
    <p>Contoh aplikasi web progresif yang responsif</p>
  </header>

  <main class="main">
    <section class="card">
      <h2>Selamat Datang!</h2>
      <p>
        Ini adalah template PWA responsif. Kamu bisa ubah teks, warna, dan layout-nya sesuai kebutuhan.
      </p>
      <button onclick="alert('PWA aktif!')">Tes Tombol</button>
    </section>

    <!-- ✅ KALKULATOR DITAMBAHKAN -->
    <section class="calculator">
      <input type="text" id="display" class="display" disabled>

      <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">*</button>
        <button onclick="appendValue('-')" class="operator">-</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
      </div>
    </section>
  </main>

  <button onclick="alert('tombol testing hidup')">Ini tombol 1</button>

  <footer class="footer">
    <p>© 2025 Anwar Fauzi</p>
  </footer>

  <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('SW registered!'))
        .catch(err => console.error('SW gagal:', err));
    }

    // ✅ LOGIC KALKULATOR
    let display = document.getElementById("display");

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
